<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stock Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for beautiful mini-charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>글로벌 시장 동향</h1>
            <p>실시간 미국 & 한국 지수 및 주도 테마 흐름</p>
        </header>

        <!-- 탭 네비게이션 추가 -->
        <div class="tabs-container">
            <button class="tab-btn active" data-target="us-section">미국 시장</button>
            <button class="tab-btn" data-target="kr-section">한국 시장</button>
            <button class="tab-btn" data-target="chart-section">미국 종목 차트</button>
        </div>

        <section class="market-section" id="us-section">
            <h2>미국 시장</h2>
            <div class="grid" id="us-market-grid">
                <!-- Cards injected by JS -->
            </div>

            <div class="section-header space-between"
                style="margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">미국 섹터 및 테마 시황</h3>
                <div class="controls-group">
                    <button id="filter-btn" class="premium-btn">보기 설정 <span class="btn-icon">👁️</span></button>
                    <button id="sort-btn" class="premium-btn primary">정렬 기준 <span class="btn-icon">▲</span></button>
                </div>
            </div>
            <div id="sectors-container" class="board-container">
                <!-- Data injected by JS -->
            </div>
        </section>

        <section class="market-section" id="kr-section">
            <h2>한국 시장</h2>
            <div class="grid" id="kr-market-grid">
                <!-- Cards injected by JS -->
            </div>

            <h3 style="margin-top: 2.5rem;">한국 주도 테마</h3>
            <div id="themes-container">
                <!-- Tables injected by JS -->
            </div>
        </section>

        <section class="market-section" id="chart-section">
            <h2>종목별 차트 검색</h2>

            <div class="search-container">
                <input type="text" id="symbol-search-input" placeholder="종목명 또는 티커 검색 (예: 애플, TSLA)" autocomplete="off">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <div id="search-results" class="search-results"></div>
            </div>

            <div class="symbol-manager" id="symbol-chips-container">
                <!-- Symbol Chips injected by JS -->
            </div>

            <div class="tradingview-widget-container" id="tv-widget-wrapper"
                style="height: 600px; width: 100%; margin-top: 2rem;">
                <div class="tradingview-widget-container__widget" id="tv-widget-inner"
                    style="height: 100%; width: 100%;"></div>
            </div>

            <!-- 5/3 추가: 미국 주식 상승률 순위 -->
            <div class="us-top-stocks-container" style="margin-top: 3rem;">
                <div class="section-header space-between" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0;">미국 주식 상승률 순위 (상위 50)</h3>
                    <div class="list-controls-container" style="display: flex; gap: 0.75rem; align-items: center;">
                        <!-- 상단: 상승률/거래대금 버튼 -->
                        <div class="sort-tabs" id="us-sort-tabs">
                            <button class="sort-type-btn sort-pill-btn active" data-sort="up">상승률</button>
                            <button class="sort-type-btn sort-pill-btn" data-sort="priceTop">거래대금</button>
                        </div>
                    </div>
                </div>
                
                <!-- 하단: 뉴욕/나스닥 탭 (전체 폭 사용) -->
                <div class="exchange-tabs-row" id="exchange-tabs" style="margin-bottom: 1.5rem;">
                    <button class="exchange-tab-item active" data-exchange="NASDAQ">NASDAQ</button>
                    <button class="exchange-tab-item" data-exchange="NYSE">NYSE</button>
                </div>

                <div class="table-responsive">
                    <table class="premium-table" id="us-top-stocks-table">
                        <thead>
                            <tr>
                                <th>종목</th>
                                <th>차트</th>
                                <th class="sortable" data-sort="price" style="cursor: pointer;">현재가 <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="volume" style="cursor: pointer;">거래량(대금) <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="marketcap" style="cursor: pointer;">시가총액 <span class="sort-icon"></span></th>
                            </tr>
                        </thead>
                        <tbody id="us-top-stocks-tbody">
                            <!-- 로딩 또는 결과 표시 영역 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
